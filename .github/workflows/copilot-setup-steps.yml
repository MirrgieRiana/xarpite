name: Copilot Setup Steps

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - run: |
          echo '' > CLAUDE.md

          echo '### BEGIN .github/copilot-instructions.md ###' >> CLAUDE.md
          cat .github/copilot-instructions.md >> CLAUDE.md
          echo '### END .github/copilot-instructions.md ###' >> CLAUDE.md

          echo '### BEGIN protocol-102.md ###' >> CLAUDE.md
          curl -sL https://raw.githubusercontent.com/MirrgieRiana/xarpite/refs/heads/main/.github/protocol-102.md >> CLAUDE.md
          echo '### END protocol-102.md ###' >> CLAUDE.md
