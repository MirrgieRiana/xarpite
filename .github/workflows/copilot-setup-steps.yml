name: Copilot Setup Steps

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - run: |
          mkdir -p build
          curl -sL https://raw.githubusercontent.com/MirrgieRiana/xarpite/refs/heads/main/.github/ISSUE_TEMPLATE/protocol-102.agent.md -o build/PROTOCOL.md
